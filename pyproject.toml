[tool.poetry]
name = "bayex"
version = "0.1.0"
description = "Bayesian Optimization with Gaussian Processes powered by JAX"
authors = ["Albert Alonso <alonfnt@pm.me>"]
repository = "https://github.com/alonfnt/bayex"
readme = "README.md"
keywords = ["automatic-differentiation", "bayesian-optimization", "jax", "gaussian-process"]
classifiers = [
	"Intended Audience :: Science/Research",
	"Topic :: Scientific/Engineering"
	]

[tool.black]
line-length = 100
target-version = ['py38']
include = '\.pyi?$'
exclude = '''

(
  /(
      \.eggs         # exclude a few common directories in the
    | \.git          # root of the project
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | tags
    | dist
  )/
  | foo.py           # also separately exclude a file named foo.py in
                     # the root of the project
)
'''

[tool.mypy]
follow_imports = 'silent'
strict_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
disallow_any_generics = false
check_untyped_defs = true
no_implicit_reexport = false
disallow_untyped_defs = true
ignore_missing_imports = true


[tool.isort]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
line_length = 100
